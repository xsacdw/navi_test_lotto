<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🍀 럭키 로또 - 행운의 번호 추천</title>
    <meta name="description" content="클릭 한 번으로 행운의 로또 번호 6개를 추천받으세요! 무작위 번호 생성기로 당신만의 행운 번호를 찾아보세요." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --gold: #FFD700;
            --gold-light: #FFF0A0;
            --purple-deep: #0D0B1F;
            --purple-mid: #1A1535;
            --purple-light: #2D2660;
            --accent: #A855F7;
            --accent2: #EC4899;
            --text: #F0E6FF;
            --text-muted: #9B8EC4;
            --ball-red: #FF4B6E;
            --ball-orange: #FF8C42;
            --ball-yellow: #FFD166;
            --ball-green: #06D6A0;
            --ball-blue: #4CC9F0;
            --ball-purple: #A855F7;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--purple-deep);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 배경 星 파티클 */
        .bg-stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle var(--dur, 3s) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0;
                transform: scale(0.5);
            }

            50% {
                opacity: var(--op, 0.8);
                transform: scale(1);
            }
        }

        /* 배경 Glow orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            pointer-events: none;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.3), transparent 70%);
            top: -150px;
            left: -150px;
            animation: floatOrb 8s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.25), transparent 70%);
            bottom: -100px;
            right: -100px;
            animation: floatOrb 10s ease-in-out infinite reverse;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(76, 201, 240, 0.2), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: floatOrb 12s ease-in-out infinite 2s;
        }

        @keyframes floatOrb {

            0%,
            100% {
                transform: translate(0, 0);
            }

            33% {
                transform: translate(30px, -20px);
            }

            66% {
                transform: translate(-20px, 30px);
            }
        }

        /* 메인 컨테이너 */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 760px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
        }

        /* 헤더 */
        .header {
            text-align: center;
        }

        .header .badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold);
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 999px;
            padding: 0.3rem 1rem;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            line-height: 1.1;
            background: linear-gradient(135deg, #FFD700 0%, #FF69B4 50%, #A855F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.75rem;
        }

        .header p {
            font-size: 1.05rem;
            color: var(--text-muted);
            font-weight: 300;
            line-height: 1.6;
        }

        /* 카드 */
        .card {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 2rem 1.75rem;
            backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 20px 60px rgba(0, 0, 0, 0.4);
        }

        /* 5게임 영역 */
        .games-wrapper {
            width: 100%;
        }

        .games-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            padding: 2rem 0;
            color: var(--text-muted);
        }

        .games-placeholder .icon {
            font-size: 3rem;
            opacity: 0.4;
        }

        .games-placeholder p {
            font-size: 0.9rem;
            font-weight: 300;
        }

        .games-grid {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
        }

        .game-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            padding: 0.9rem 1rem;
            animation: gameRowIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            transition: background 0.2s, border-color 0.2s;
        }

        .game-row:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(168, 85, 247, 0.3);
        }

        @keyframes gameRowIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .game-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            min-width: 32px;
            text-align: center;
            flex-shrink: 0;
        }

        .game-balls {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            flex-wrap: wrap;
        }

        .game-copy-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.13);
            color: var(--text-muted);
            border-radius: 8px;
            padding: 0.28rem 0.55rem;
            font-size: 0.68rem;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .game-copy-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(168, 85, 247, 0.1);
        }

        .game-copy-btn.copied {
            border-color: #06D6A0;
            color: #06D6A0;
            background: rgba(6, 214, 160, 0.1);
        }

        .balls-container {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .ball {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 900;
            color: white;
            position: relative;
            cursor: default;
            transition: transform 0.3s ease;
            animation: ballPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
            box-shadow:
                0 6px 16px rgba(0, 0, 0, 0.35),
                0 0 0 2px rgba(255, 255, 255, 0.15) inset,
                0 -2px 0 rgba(0, 0, 0, 0.25) inset;
        }

        .ball::before {
            content: '';
            position: absolute;
            top: 12%;
            left: 20%;
            width: 35%;
            height: 25%;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            filter: blur(3px);
        }

        .ball:hover {
            transform: translateY(-5px) scale(1.1);
        }

        @keyframes ballPop {
            0% {
                opacity: 0;
                transform: scale(0.3) rotate(-15deg);
            }

            70% {
                transform: scale(1.1) rotate(5deg);
            }

            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        /* 볼 색상 (1-10: red, 11-20: orange, 21-30: yellow, 31-40: blue/green, 41-45: purple) */
        .ball.range-1 {
            background: linear-gradient(145deg, #FF6B8A, #E53E3E);
        }

        .ball.range-2 {
            background: linear-gradient(145deg, #FFA45C, #E8711A);
        }

        .ball.range-3 {
            background: linear-gradient(145deg, #FFE066, #D4A017);
        }

        .ball.range-4 {
            background: linear-gradient(145deg, #5CF0CE, #0EA47E);
        }

        .ball.range-5 {
            background: linear-gradient(145deg, #C084FC, #7E22CE);
        }

        /* 구분선 */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            margin: 0.5rem 0;
        }

        /* 세트 목록 */
        .sets-section {
            width: 100%;
        }

        .sets-title {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .sets-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 340px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .sets-list::-webkit-scrollbar {
            width: 4px;
        }

        .sets-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .sets-list::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.4);
            border-radius: 2px;
        }

        /* 회차 묶음 */
        .round-block {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            overflow: hidden;
            animation: slideIn 0.4s ease both;
        }

        .round-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0.9rem;
            background: rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .round-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.08em;
        }

        .round-copy-all {
            background: none;
            border: 1px solid rgba(255, 215, 0, 0.25);
            color: rgba(255, 215, 0, 0.7);
            border-radius: 6px;
            padding: 0.2rem 0.5rem;
            font-size: 0.65rem;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .round-copy-all:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(255, 215, 0, 0.08);
        }

        .round-games {
            padding: 0.4rem 0.6rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .set-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.3rem;
            border-radius: 8px;
            transition: background 0.15s;
        }

        .set-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .set-index {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 22px;
            text-align: center;
        }

        .mini-balls {
            display: flex;
            gap: 0.28rem;
            flex: 1;
            flex-wrap: wrap;
        }

        .mini-ball {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.62rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            position: relative;
            flex-shrink: 0;
        }

        .mini-ball::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 22%;
            width: 30%;
            height: 20%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            filter: blur(2px);
        }

        .copy-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.13);
            color: var(--text-muted);
            border-radius: 6px;
            padding: 0.22rem 0.45rem;
            font-size: 0.62rem;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(168, 85, 247, 0.1);
        }

        .copy-btn.copied {
            border-color: #06D6A0;
            color: #06D6A0;
            background: rgba(6, 214, 160, 0.1);
        }

        /* 버튼 영역 */
        .btn-group {
            display: flex;
            gap: 1rem;
            width: 100%;
            flex-wrap: wrap;
        }

        .btn-generate {
            flex: 1;
            min-width: 200px;
            padding: 1.1rem 2rem;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--purple-deep);
            background: linear-gradient(135deg, #FFD700 0%, #FF8C42 50%, #FF4B6E 100%);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
        }

        .btn-generate::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent 60%);
            pointer-events: none;
        }

        .btn-generate::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, #FFD700, #FF4B6E, #A855F7);
            border-radius: 18px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.3) inset;
        }

        .btn-generate:hover::after {
            opacity: 1;
        }

        .btn-generate:active {
            transform: translateY(0px);
        }

        .btn-generate .btn-icon {
            margin-right: 0.5rem;
        }

        .btn-clear {
            padding: 1.1rem 1.5rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-clear:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* 통계 */
        .stats {
            display: flex;
            gap: 0.75rem;
            width: 100%;
        }

        .stat-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 0.85rem 0.5rem;
            text-align: center;
        }

        .stat-val {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.68rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 0.3rem;
            letter-spacing: 0.04em;
        }

        /* 당첨 확률 */
        .probability {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .probability strong {
            color: var(--gold);
            font-weight: 600;
        }

        /* 푸터 */
        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(155, 142, 196, 0.5);
            line-height: 1.6;
        }

        /* 토스트 */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(6, 214, 160, 0.15);
            border: 1px solid rgba(6, 214, 160, 0.4);
            color: #06D6A0;
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* 반응형 */
        @media (max-width: 540px) {
            .ball {
                width: 42px;
                height: 42px;
                font-size: 0.85rem;
            }

            .game-balls {
                gap: 0.35rem;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn-clear {
                text-align: center;
            }

            .card {
                padding: 1.5rem 1rem;
            }

            .game-row {
                padding: 0.65rem 0.75rem;
            }
        }
    </style>
</head>

<body>

    <!-- 배경 -->
    <div class="bg-stars" id="bgStars"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container">
        <!-- 헤더 -->
        <header class="header">
            <div class="badge">🍀 Lucky Number Generator</div>
            <h1>행운의 로또<br />번호 추천</h1>
            <p>버튼을 누르면 <strong style="color:var(--gold)">5게임</strong>을 한꺼번에 추천해드립니다</p>
        </header>

        <!-- 메인 카드 -->
        <div class="card">
            <!-- 5게임 표시 영역 -->
            <div class="games-wrapper" id="gamesWrapper">
                <div class="games-placeholder" id="placeholder">
                    <div class="icon">🎱</div>
                    <p>아래 버튼을 눌러 5게임을 추천받으세요!</p>
                </div>
                <div class="games-grid" id="gamesGrid" style="display:none;"></div>
            </div>

            <div class="divider" style="margin: 1rem 0;"></div>

            <!-- 버튼 -->
            <div class="btn-group" style="margin-bottom: 1rem;">
                <button class="btn-generate" id="generateBtn" onclick="generateNumbers()">
                    <span class="btn-icon">✨</span> 5게임 추천받기
                </button>
                <button class="btn-clear" id="clearBtn" onclick="clearAll()">초기화</button>
            </div>

            <!-- 통계 -->
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-val" id="statRound">0</div>
                    <div class="stat-label">추천 회차</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="statTotal">0</div>
                    <div class="stat-label">총 게임 수</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="statAvg">—</div>
                    <div class="stat-label">평균값</div>
                </div>
            </div>
        </div>

        <!-- 이전 세트 -->
        <div class="sets-section" id="setsSection" style="display:none;">
            <div class="sets-title">📋 추천 이력 (회차별 5게임)</div>
            <div class="sets-list" id="setsList"></div>
        </div>

        <!-- 당첨 확률 -->
        <div class="probability">
            1등 당첨 확률: <strong>1 / 8,145,060</strong> (약 0.0000123%)
        </div>

        <!-- 푸터 -->
        <footer class="footer">
            이 서비스는 순수 오락 목적입니다.<br />
            도박 중독 예방 상담: ☎ 1336
        </footer>
    </div>

    <!-- 복사 토스트 -->
    <div class="toast" id="toast">✅ 번호가 복사되었습니다!</div>

    <script>
        // ——— 별 배경 생성 ———
        (function createStars() {
            const container = document.getElementById('bgStars');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2.5 + 0.5;
                const dur = (Math.random() * 4 + 2).toFixed(1);
                const delay = (Math.random() * 6).toFixed(1);
                const op = (Math.random() * 0.6 + 0.2).toFixed(2);
                star.style.cssText = `
          width:${size}px; height:${size}px;
          top:${Math.random() * 100}%; left:${Math.random() * 100}%;
          --dur:${dur}s; --op:${op};
          animation-delay:${delay}s;
        `;
                container.appendChild(star);
            }
        })();

        // ——— 상태 ———
        const GAMES_PER_ROUND = 5;
        let roundCount = 0;
        let history = []; // 각 원소 = 5게임 배열

        // ——— 볼 색상 결정 ———
        function getBallRange(num) {
            if (num <= 10) return 'range-1';
            if (num <= 20) return 'range-2';
            if (num <= 30) return 'range-3';
            if (num <= 40) return 'range-4';
            return 'range-5';
        }

        // ——— 로또 번호 1세트 생성 ———
        function generateLottoNumbers() {
            const pool = Array.from({ length: 45 }, (_, i) => i + 1);
            const result = [];
            for (let i = 0; i < 6; i++) {
                const idx = Math.floor(Math.random() * pool.length);
                result.push(pool.splice(idx, 1)[0]);
            }
            return result.sort((a, b) => a - b);
        }

        // ——— 볼 엘리먼트 생성 (className: ball or mini-ball) ———
        function createBallEl(num, cls, delay = 0) {
            const ball = document.createElement('div');
            ball.className = `${cls} ${getBallRange(num)}`;
            ball.textContent = num;
            if (delay) ball.style.animationDelay = `${delay}s`;
            return ball;
        }

        // ——— 복사 버튼 공용 헬퍼 ———
        function makeCopyBtn(numbers, label = '복사', cls = 'game-copy-btn') {
            const btn = document.createElement('button');
            btn.className = cls;
            btn.textContent = label;
            btn.onclick = () => copyNumbers(numbers, btn);
            return btn;
        }

        // ——— 메인 5게임 표시 ———
        function renderMainGames(games) {
            const grid = document.getElementById('gamesGrid');
            grid.style.display = 'flex';
            document.getElementById('placeholder').style.display = 'none';
            grid.innerHTML = '';

            games.forEach((numbers, gi) => {
                const row = document.createElement('div');
                row.className = 'game-row';
                row.style.animationDelay = `${gi * 0.08}s`;

                const label = document.createElement('div');
                label.className = 'game-label';
                label.textContent = `G${gi + 1}`;

                const ballsWrap = document.createElement('div');
                ballsWrap.className = 'game-balls';
                numbers.forEach((num, bi) => {
                    ballsWrap.appendChild(createBallEl(num, 'ball', gi * 0.08 + bi * 0.07));
                });

                const copyBtn = makeCopyBtn(numbers);

                row.appendChild(label);
                row.appendChild(ballsWrap);
                row.appendChild(copyBtn);
                grid.appendChild(row);
            });
        }

        // ——— 통계 업데이트 ———
        function updateStats() {
            const totalGames = roundCount * GAMES_PER_ROUND;
            // 마지막 회차 평균 계산
            let avgVal = '—';
            if (history.length > 0) {
                const allNums = history[0].flat();
                avgVal = (allNums.reduce((a, b) => a + b, 0) / allNums.length).toFixed(1);
            }
            document.getElementById('statRound').textContent = roundCount;
            document.getElementById('statTotal').textContent = totalGames;
            document.getElementById('statAvg').textContent = avgVal;
        }

        // ——— 이력 회차 블록 렌더 ———
        function addHistoryRound(games, round) {
            const list = document.getElementById('setsList');
            const section = document.getElementById('setsSection');
            section.style.display = 'block';

            const block = document.createElement('div');
            block.className = 'round-block';

            // 헤더
            const header = document.createElement('div');
            header.className = 'round-header';
            const lbl = document.createElement('div');
            lbl.className = 'round-label';
            lbl.textContent = `✦ ${round}회차 추천`;
            const allNums = games.flat();
            const copyAllBtn = document.createElement('button');
            copyAllBtn.className = 'round-copy-all';
            copyAllBtn.textContent = '전체 복사';
            copyAllBtn.onclick = () => {
                const text = games.map((g, i) => `G${i + 1}: ${g.join(', ')}`).join('\n');
                copyText(text, copyAllBtn, '✓ 복사됨', '전체 복사');
            };
            header.appendChild(lbl);
            header.appendChild(copyAllBtn);

            // 게임 목록
            const gamesDiv = document.createElement('div');
            gamesDiv.className = 'round-games';
            games.forEach((numbers, gi) => {
                const item = document.createElement('div');
                item.className = 'set-item';

                const idx = document.createElement('div');
                idx.className = 'set-index';
                idx.textContent = `G${gi + 1}`;

                const miniBalls = document.createElement('div');
                miniBalls.className = 'mini-balls';
                numbers.forEach(num => miniBalls.appendChild(createBallEl(num, 'mini-ball')));

                const copyBtn = makeCopyBtn(numbers, '복사', 'copy-btn');

                item.appendChild(idx);
                item.appendChild(miniBalls);
                item.appendChild(copyBtn);
                gamesDiv.appendChild(item);
            });

            block.appendChild(header);
            block.appendChild(gamesDiv);
            list.insertBefore(block, list.firstChild);
        }

        // ——— 번호 복사 공통 ———
        function copyText(text, btn, doneLabel, origLabel) {
            navigator.clipboard.writeText(text).then(() => {
                if (btn) {
                    btn.textContent = doneLabel;
                    setTimeout(() => { btn.textContent = origLabel; }, 2000);
                }
                showToast();
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text; document.body.appendChild(ta);
                ta.select(); document.execCommand('copy');
                document.body.removeChild(ta);
                showToast();
            });
        }

        function copyNumbers(numbers, btn) {
            copyText(numbers.join(', '), btn, '✓ 복사됨', '복사');
        }

        // ——— 토스트 ———
        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ——— 메인 생성 함수 (5게임) ———
        function generateNumbers() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = '🎲 추첨 중...';

            setTimeout(() => {
                const games = Array.from({ length: GAMES_PER_ROUND }, generateLottoNumbers);
                roundCount++;
                history.unshift(games);
                if (history.length > 10) history.pop();

                renderMainGames(games);
                updateStats();
                addHistoryRound(games, roundCount);

                btn.disabled = false;
                btn.innerHTML = '<span class="btn-icon">✨</span> 5게임 추천받기';
            }, 600);
        }

        // ——— 초기화 ———
        function clearAll() {
            roundCount = 0;
            history = [];
            document.getElementById('gamesGrid').style.display = 'none';
            document.getElementById('gamesGrid').innerHTML = '';
            document.getElementById('placeholder').style.display = 'flex';
            document.getElementById('setsList').innerHTML = '';
            document.getElementById('setsSection').style.display = 'none';
            document.getElementById('statRound').textContent = '0';
            document.getElementById('statTotal').textContent = '0';
            document.getElementById('statAvg').textContent = '—';
        }

        // ——— 키보드 단축키 (Space/Enter) ———
        document.addEventListener('keydown', (e) => {
            if ((e.code === 'Space' || e.code === 'Enter') && !e.target.closest('button') && !e.target.closest('input')) {
                e.preventDefault();
                generateNumbers();
            }
        });
    </script>
</body>

</html>
